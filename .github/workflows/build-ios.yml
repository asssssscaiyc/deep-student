name: Build Deep Student for iOS (unsigned)

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios aarch64-apple-ios-sim

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install protoc
        run: brew install protobuf

      - name: Set development team in config
        run: |
          node -e "
            const fs = require('fs');
            let cfg = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            cfg.bundle = cfg.bundle || {};
            cfg.bundle.iOS = cfg.bundle.iOS || {};
            cfg.bundle.iOS.developmentTeam = 'DUMMYTEAM';
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(cfg, null, 2));
          "

      - name: Initialize iOS project
        run: |
          export NODE_OPTIONS="--max-old-space-size=8192"
          npx @tauri-apps/cli@latest ios init

      - name: Build iOS App (unsigned)
        run: |
          export NODE_OPTIONS="--max-old-space-size=8192"
          npx @tauri-apps/cli@latest ios build --no-sign

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: DeepStudent-iOS
          path: src-tauri/gen/apple/build/arm64/*.ipa
